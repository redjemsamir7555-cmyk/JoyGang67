<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOYGANG67 // DISCORD OS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #313338; --side: #2b2d31; --input: #383a40; --text: #dbdee1;
            --primary: #5865f2; --danger: #ed4245; --67-red: 0;
        }

        body, html { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            font-family: 'gg sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: var(--bg); color: var(--text); overflow: hidden;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        /* EFFET ROUGE 67 */
        #explosion-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, var(--67-red));
            pointer-events: none; z-index: 999; transition: 0.1s;
        }

        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* SIDEBAR STYLE DISCORD */
        .sidebar { 
            width: 260px; background: var(--side); display: flex; flex-direction: column;
            border-right: 1px solid rgba(0,0,0,0.2); padding: 15px; gap: 10px;
        }
        .sidebar h2 { font-size: 1.2em; color: white; margin-bottom: 20px; border-bottom: 1px solid #3f4147; padding-bottom: 10px; }

        /* CHAT AREA */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; }
        #chat-header { height: 50px; border-bottom: 1px solid rgba(0,0,0,0.2); display: flex; align-items: center; padding: 0 20px; font-weight: bold; background: var(--bg); }

        #messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 2px; }
        
        /* MESSAGE LUXE */
        .msg { 
            display: flex; gap: 15px; padding: 5px 10px; transition: background 0.1s;
            animation: slideIn 0.2s ease-out;
        }
        .msg:hover { background: rgba(0,0,0,0.05); }
        .msg .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
        .msg .content-wrap { display: flex; flex-direction: column; }
        .msg .meta { font-size: 0.8em; display: flex; gap: 10px; align-items: center; }
        .msg .meta .uname { font-weight: bold; color: white; cursor: pointer; }
        .msg .meta .time { color: #949ba4; font-size: 0.85em; }
        .msg .text { line-height: 1.4; white-space: pre-wrap; }
        .msg img { max-width: 400px; border-radius: 8px; margin-top: 10px; border: 1px solid rgba(255,255,255,0.1); }

        /* INPUT BAR */
        .input-wrapper { padding: 0 20px 24px 20px; background: var(--bg); }
        .input-box { 
            background: var(--input); border-radius: 8px; padding: 10px 15px;
            display: flex; align-items: center; gap: 15px;
        }
        input[type="text"] { flex: 1; background: none; border: none; color: var(--text); outline: none; font-size: 1em; }
        .plus-btn { width: 24px; height: 24px; background: #b5bac1; color: var(--input); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; }
        .plus-btn:hover { background: white; }

        /* JUMPSCARE & EXPLOSION */
        #jumpscare-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:10000; display:none; }
        .shake { animation: shake-anim 0.1s infinite; }
        @keyframes shake-anim { 0% { transform: translate(2px, 1px) rotate(0deg); } 50% { transform: translate(-1px, -2px) rotate(-1deg); } 100% { transform: translate(1px, 2px) rotate(0deg); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        /* 67 PATTERN BACKGROUND */
        .bg-67 { position: fixed; top:0; left:0; width:100%; height:100%; opacity: 0.03; pointer-events: none; font-size: 80px; font-weight: 900; line-height: 0.8; z-index: -1; }
    </style>
</head>
<body>

<div id="explosion-overlay"></div>
<div id="jumpscare-screen"></div>
<div class="bg-67" id="bg-pattern"></div>

<div class="app-container">
    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>GOYGANG67</h2>
        <div style="font-size: 0.8em; color: #949ba4; margin-bottom: 5px;">TON PSEUDO</div>
        <input type="text" id="my-name" value="User67" style="background:#1e1f22; border-radius:4px; padding:5px; margin-bottom:15px;">
        
        <div style="font-size: 0.8em; color: #949ba4; margin-bottom: 5px;">COULEUR PSEUDO</div>
        <input type="color" id="my-color" value="#5865f2" style="width:100%; height:30px; border:none; cursor:pointer;">

        <button onclick="changeStyle('shrek')" style="margin-top:20px; background:#4e5058;">STYLE SHREK (ALL)</button>
        <button onclick="changeStyle('discord')" style="background:#4e5058;">STYLE DISCORD (ALL)</button>
        <button onclick="clearAll()" style="background:var(--danger); margin-top: auto;">NETTOYER TOUT</button>
    </div>

    <!-- MAIN CHAT -->
    <div class="chat-area">
        <div id="chat-header"># general-67</div>
        <div id="messages-container"></div>
        
        <div class="input-wrapper">
            <div class="input-box">
                <label class="plus-btn" for="file-up" title="Upload fichier">+</label>
                <input type="file" id="file-up" style="display:none" multiple onchange="uploadFiles()">
                <input type="text" id="chat-input" placeholder="Envoyer un message dans #general-67 (Spam 67 pour l'explosion!)">
            </div>
        </div>
    </div>
</div>

<script>
    // INITIALISATION SUPABASE (Corrigé avec tes vraies clés)
    const S_URL = 'https://cqxelnijwtjdnczpaggs.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxeGVsbmlqd3RqZG5jenBhZ2dzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwODY4NjIsImV4cCI6MjA5NDY2Mjg2Mn0.LPElYtLB8NGV70_Y4yWCu8xb6SUBz67_Z7DhypQjPEI';
    const sb = supabase.createClient(S_URL, S_KEY);

    let spam67 = 0;
    let lastJumpscareId = null;

    // Background pattern "67"
    document.getElementById('bg-pattern').innerText = "67 ".repeat(500);

    // --- LOGIQUE 67 & EXPLOSION ---
    document.getElementById('chat-input').addEventListener('keydown', async (e) => {
        if(e.key === 'Enter') {
            const val = e.target.value;
            if(val.includes('67')) {
                spam67 += 0.15;
                document.documentElement.style.setProperty('--67-red', spam67);
                document.body.classList.add('shake');
                setTimeout(() => document.body.classList.remove('shake'), 200);

                if(spam67 >= 1) {
                    await triggerGlobalJumpscare();
                    spam67 = 0;
                    document.documentElement.style.setProperty('--67-red', 0);
                }
            }
            sendMsg(val);
            e.target.value = '';
        }
    });

    async function sendMsg(txt) {
        if(!txt) return;
        const name = document.getElementById('my-name').value;
        const col = document.getElementById('my-color').value;
        await sb.from('messages').insert([{ username: name, content: txt, color: col, type: 'text' }]);
        fetch();
    }

    async function uploadFiles() {
        const files = document.getElementById('file-up').files;
        const name = document.getElementById('my-name').value;
        const col = document.getElementById('my-color').value;

        for(let f of files) {
            const path = `f_${Date.now()}_${f.name}`;
            const { data, error } = await sb.storage.from('fichiers').upload(path, f);
            if(data) {
                const url = `${S_URL}/storage/v1/object/public/fichiers/${path}`;
                await sb.from('messages').insert([{ username: name, content: url, color: col, type: 'text' }]);
            }
        }
        fetch();
    }

    async function fetch() {
        const { data } = await sb.from('messages').select('*').order('created_at', { ascending: true });
        if(!data) return;

        const container = document.getElementById('messages-container');
        container.innerHTML = '';

        data.forEach(m => {
            // Synchro des Styles Globaux
            if(m.type === 'style') applyStyle(m.content);
            if(m.type === 'jumpscare' && m.id !== lastJumpscareId) {
                doJumpscare();
                lastJumpscareId = m.id;
            }

            if(m.type === 'text') {
                const isImg = m.content.includes('supabase.co/storage');
                container.innerHTML += `
                    <div class="msg">
                        <div class="avatar">${m.username[0].toUpperCase()}</div>
                        <div class="content-wrap">
                            <div class="meta">
                                <span class="uname" style="color:${m.color}">${m.username}</span>
                                <span class="time">${new Date(m.created_at).toLocaleTimeString()}</span>
                            </div>
                            <div class="text">
                                ${isImg ? `<img src="${m.content}">` : m.content}
                            </div>
                        </div>
                    </div>
                `;
            }
        });
        container.scrollTop = container.scrollHeight;
    }

    // --- FONCTIONS SOCIALES ---
    async function changeStyle(s) {
        await sb.from('messages').insert([{ username: 'SYSTEM', type: 'style', content: s }]);
    }

    function applyStyle(s) {
        if(s === 'shrek') {
            document.documentElement.style.setProperty('--bg', '#5d4037');
            document.documentElement.style.setProperty('--side', '#8bc34a');
            document.body.style.backgroundImage = "url('https://wallpapers.com/images/hd/shrek-background-1920-x-1080-60m310h0n76f571j.jpg')";
            document.body.style.backgroundSize = "cover";
        } else {
            document.documentElement.style.setProperty('--bg', '#313338');
            document.documentElement.style.setProperty('--side', '#2b2d31');
            document.body.style.backgroundImage = "none";
        }
    }

    async function triggerGlobalJumpscare() {
        await sb.from('messages').insert([{ username: 'SYSTEM', type: 'jumpscare', content: 'BOOM' }]);
    }

    function doJumpscare() {
        const scr = document.getElementById('jumpscare-screen');
        scr.style.display = 'block';
        scr.innerHTML = `<img src="https://media.tenor.com/r9GmMxwqtwgAAAAe/jeff-the-killer-that-face.png" style="width:100%;height:100%;object-fit:cover;">`;
        setTimeout(() => { scr.style.display = 'none'; }, 2000);
    }

    async function clearAll() {
        if(confirm("WIPE DATABASE?")) {
            await sb.from('messages').delete().neq('id', 0);
            location.reload();
        }
    }

    setInterval(fetch, 3000);
    fetch();
</script>

</body>
</html>
